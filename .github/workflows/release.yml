name: Release

on:
  push:
    branches: [master]
    # Only branch pushes — tag pushes never retrigger this
    tags-ignore:
      - "**"

# One release at a time — never cancel a running release
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Version bump, tag & GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push version-bump commit + annotated tag

    # FIX: Skip the bot's own version-bump commits so we don't loop.
    # [skip ci] in commit message is respected by GitHub for push triggers,
    # but this explicit guard is belt-and-suspenders.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      # ── FIX [3]: Checkout with a PAT (or fine-grained token) that can push
      # to a protected master branch.  GITHUB_TOKEN cannot bypass branch
      # protection rules that require PRs.
      #
      # HOW TO SET UP:
      #   1. Go to GitHub → Settings → Developer Settings → Personal Access Tokens
      #   2. Create a fine-grained PAT with:
      #        • Repository: sharanabasaveshwar/predictkit
      #        • Permissions: Contents = Read & Write
      #   3. Go to repo → Settings → Secrets → Actions → New secret
      #      Name: GH_RELEASE_PAT   Value: <your token>
      #   4. In repo → Settings → Branches → master protection rule:
      #      Enable "Allow specified actors to bypass required pull requests"
      #      and add your bot user or GitHub Actions.
      #
      # If you haven't set this up yet, temporarily disable branch protection
      # on master for the first release, then re-enable it.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_RELEASE_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" build twine

      # ── 1. Read current stable base version ──────────────────────────────
      # pyproject.toml is the single source of truth for the stable version.
      # Strip any dev suffix left from a previous dev-stamp (shouldn't exist
      # on master, but safe to handle).
      - name: Read current version
        id: current
        run: |
          VERSION=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              v = tomllib.load(f)['project']['version']
          print(v.split('-')[0])
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current stable base: $VERSION"

      # ── 2. Determine version bump from conventional commits ───────────────
      # Scans commits since the last STABLE tag (ignores -dev.* tags).
      # FIX [4]: On first release (no stable tags), uses a sentinel so
      # only commits on master since the branch was created are scanned,
      # not the entire repo history (which could inflate the bump type).
      - name: Determine version bump
        id: bump
        run: |
          python3 - << 'PYEOF'
          import subprocess, re, os

          # ── Find last stable tag ──────────────────────────────────────────
          result = subprocess.run(
              ["git", "tag", "--list", "v[0-9]*.[0-9]*.[0-9]*"],
              capture_output=True, text=True
          )
          def semver(t):
              m = re.match(r"v(\d+)\.(\d+)\.(\d+)$", t.strip())
              return tuple(int(x) for x in m.groups()) if m else None

          stable_tags = [t.strip() for t in result.stdout.splitlines()
                         if t.strip() and semver(t.strip())]
          stable_tags.sort(key=lambda t: semver(t))

          if stable_tags:
              last_tag  = stable_tags[-1]
              log_range = f"{last_tag}..HEAD"
              print(f"Last stable tag: {last_tag}")
          else:
              # FIX: First release — find the point where master diverged from
              # its parent (the merge-base with dev) so we only count commits
              # that were explicitly merged to master, not all of history.
              merge_base = subprocess.run(
                  ["git", "merge-base", "master", "dev"],
                  capture_output=True, text=True
              )
              if merge_base.returncode == 0:
                  base_sha  = merge_base.stdout.strip()
                  log_range = f"{base_sha}..HEAD"
                  print(f"First release — scanning from merge-base {base_sha[:8]}")
              else:
                  # Truly the first commit ever — scan all of HEAD
                  log_range = "HEAD"
                  print("First release — no merge-base found, scanning all commits")

          # ── Collect commits, excluding bot/chore noise ────────────────────
          result = subprocess.run(
              ["git", "log", log_range, "--format=%s"],
              capture_output=True, text=True
          )
          commits = [
              c.strip() for c in result.stdout.splitlines()
              if c.strip()
              and not c.strip().startswith("Merge ")
              and not re.match(r"^[Rr]evert", c.strip())
              and not c.strip().startswith("chore: stamp dev version")
              and not c.strip().startswith("chore: bump version")
          ]

          print(f"Commits analysed: {len(commits)}")
          for c in commits:
              print(f"  {c}")

          # ── Determine bump ────────────────────────────────────────────────
          # feat!: or BREAKING CHANGE → major
          # feat:                     → minor
          # fix: / everything else    → patch
          bump = "patch"
          for commit in commits:
              if "BREAKING CHANGE" in commit or re.match(r"^[a-z]+(\(.+\))?!:", commit):
                  bump = "major"
                  break
              if re.match(r"^feat(\(.+\))?:", commit) and bump != "major":
                  bump = "minor"

          print(f"Bump type: {bump}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"bump={bump}\n")
          PYEOF

      # ── 3. Compute new version ────────────────────────────────────────────
      - name: Calculate new version
        id: new_ver
        run: |
          python3 - << 'PYEOF'
          import os
          current = os.environ["CURRENT_VERSION"]
          bump    = os.environ["BUMP_TYPE"]
          major, minor, patch = map(int, current.split("."))
          if   bump == "major": major += 1; minor = 0; patch = 0
          elif bump == "minor": minor += 1; patch = 0
          else:                 patch += 1
          new = f"{major}.{minor}.{patch}"
          print(f"{current} → {new}  ({bump} bump)")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={new}\n")
          PYEOF
        env:
          CURRENT_VERSION: ${{ steps.current.outputs.version }}
          BUMP_TYPE:        ${{ steps.bump.outputs.bump }}

      # ── 4. Write new version to pyproject.toml + __init__.py ─────────────
      - name: Bump pyproject.toml
        run: |
          V="${{ steps.new_ver.outputs.version }}"
          sed -i "s|^version = \".*\"|version = \"${V}\"|" pyproject.toml
          grep "^version" pyproject.toml

      - name: Bump predictkit/__init__.py
        run: |
          V="${{ steps.new_ver.outputs.version }}"
          sed -i "s|__version__ = \".*\"|__version__ = \"${V}\"|" predictkit/__init__.py
          grep "__version__" predictkit/__init__.py

      # ── 5. Tests + build ─────────────────────────────────────────────────
      - name: Run full test suite
        run: pytest tests/ -v --tb=short

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify distribution
        run: twine check dist/*

      # ── 6. FIX [5]: Generate changelog from conventional commits ──────────
      - name: Generate changelog
        id: changelog
        run: |
          python3 - << 'PYEOF'
          import subprocess, re, os

          # Same range logic as the bump step
          result = subprocess.run(
              ["git", "tag", "--list", "v[0-9]*.[0-9]*.[0-9]*"],
              capture_output=True, text=True
          )
          def semver(t):
              m = re.match(r"v(\d+)\.(\d+)\.(\d+)$", t.strip())
              return tuple(int(x) for x in m.groups()) if m else None
          stable_tags = sorted(
              [t.strip() for t in result.stdout.splitlines() if t.strip() and semver(t.strip())],
              key=lambda t: semver(t)
          )
          if stable_tags:
              log_range = f"{stable_tags[-1]}..HEAD"
          else:
              merge_base = subprocess.run(
                  ["git", "merge-base", "master", "dev"],
                  capture_output=True, text=True
              )
              log_range = f"{merge_base.stdout.strip()}..HEAD" if merge_base.returncode == 0 else "HEAD"

          result = subprocess.run(
              ["git", "log", log_range, "--format=%s"],
              capture_output=True, text=True
          )
          commits = [
              c.strip() for c in result.stdout.splitlines()
              if c.strip()
              and not c.strip().startswith("Merge ")
              and not re.match(r"^[Rr]evert", c.strip())
              and not c.strip().startswith("chore: stamp dev version")
              and not c.strip().startswith("chore: bump version")
          ]

          sections = {
              "feat":     ("🚀 Features",      []),
              "fix":      ("🐛 Bug Fixes",      []),
              "perf":     ("⚡ Performance",    []),
              "refactor": ("♻️  Refactoring",   []),
              "docs":     ("📚 Documentation",  []),
              "test":     ("🧪 Tests",          []),
              "build":    ("🏗️  Build",         []),
              "ci":       ("👷 CI/CD",          []),
              "chore":    ("🔧 Chores",         []),
              "style":    ("💄 Style",          []),
          }
          for commit in commits:
              m = re.match(r"^([a-z]+)(\(.+\))?!?:\s*(.+)", commit)
              if m:
                  type_  = m.group(1)
                  scope  = f"**{m.group(2)[1:-1]}**: " if m.group(2) else ""
                  msg    = m.group(3)
                  if type_ in sections:
                      sections[type_][1].append(f"- {scope}{msg}")

          lines = ["## What's Changed\n"]
          for _, (title, items) in sections.items():
              if items:
                  lines += [f"### {title}"] + items + [""]

          changelog = "\n".join(lines)
          with open("RELEASE_NOTES.md", "w") as f:
              f.write(changelog)
          print(changelog)
          PYEOF

      # ── 7. Commit version bump to master ──────────────────────────────────
      # [skip ci] prevents this commit from re-triggering this workflow.
      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml predictkit/__init__.py
          git commit -m "chore: bump version to ${{ steps.new_ver.outputs.version }} [skip ci]"

      # ── 8. Tag + push ─────────────────────────────────────────────────────
      - name: Push stable tag
        run: |
          TAG="v${{ steps.new_ver.outputs.version }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin HEAD:master --follow-tags
          echo "✅ Pushed $TAG"

      # ── 9. GitHub Release with changelog body ────────────────────────────
      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs    = require("fs");
            const notes = fs.readFileSync("RELEASE_NOTES.md", "utf8");
            const tag   = `v${{ steps.new_ver.outputs.version }}`;
            const rel   = await github.rest.repos.createRelease({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              tag_name:   tag,
              name:       `PredictKit ${tag}`,
              body:       notes,
              draft:      false,
              prerelease: false,
            });
            console.log(`✅ GitHub Release: ${rel.data.html_url}`);

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ steps.new_ver.outputs.version }}
          path: dist/

      # ── 10. Summary ───────────────────────────────────────────────────────
      - name: Summary
        run: |
          {
            echo "### 🚀 Release Published"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Tag** | \`v${{ steps.new_ver.outputs.version }}\` |"
            echo "| **Bump** | \`${{ steps.bump.outputs.bump }}\` |"
            echo "| **Triggered by** | ${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"
