name: Release & Publish for predictkit

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────
  validate:
    name: ✅ Validate Release
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

  # ─────────────────────────────────────────
  version:
    name: 🔖 Bump Version & Changelog
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      changelog: ${{ steps.changelog.outputs.changelog }}

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get latest dev tag for version
        id: version
        run: |
          # Get latest dev tag (e.g. v1.2.3-dev.5 → v1.2.3)
          LATEST_DEV=$(git tag --list '*-dev.*' --sort=-version:refname | head -1)
          
          if [ -z "$LATEST_DEV" ]; then
            NEW_VERSION="0.1.0"
          else
            NEW_VERSION=$(echo "$LATEST_DEV" | sed 's/-dev\..*//')
          fi

          echo "Release version from dev tag: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.new_version }}
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" $LAST_TAG..HEAD)
          fi

          # Group commits
          FEATURES=$(echo "$COMMITS" | grep "^- feat" || true)
          FIXES=$(echo "$COMMITS" | grep "^- fix" || true)
          BREAKING=$(echo "$COMMITS" | grep -E "^- (breaking|feat)!" || true)
          OTHERS=$(echo "$COMMITS" | grep -vE "^- (feat|fix|breaking)" || true)

          CHANGELOG="## predictkit v$VERSION — $(date +'%B %d, %Y')\n\n"
          [ -n "$BREAKING" ] && CHANGELOG="${CHANGELOG}### 🚨 Breaking Changes\n$BREAKING\n\n"
          [ -n "$FEATURES" ] && CHANGELOG="${CHANGELOG}### ✨ Features\n$FEATURES\n\n"
          [ -n "$FIXES" ] && CHANGELOG="${CHANGELOG}### 🐛 Fixes\n$FIXES\n\n"
          [ -n "$OTHERS" ] && CHANGELOG="${CHANGELOG}### 📦 Other\n$OTHERS"

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG.md
        run: |
          VERSION=${{ steps.version.outputs.new_version }}
          CHANGELOG="${{ steps.changelog.outputs.changelog }}"
          
          if [ -f CHANGELOG.md ]; then
            echo -e "$CHANGELOG\n\n$(cat CHANGELOG.md)" > CHANGELOG.md
          else
            echo -e "$CHANGELOG" > CHANGELOG.md
          fi
          git add CHANGELOG.md
          git commit -m "docs(changelog): v$VERSION [skip ci]" || true
          git push origin master

  # ─────────────────────────────────────────
  tag:
    name: 🏷️ Create Git Tag
    runs-on: ubuntu-latest
    needs: version

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create tag
        run: |
          VERSION=${{ needs.version.outputs.new_version }}
          git tag -a "v$VERSION" -m "predictkit v$VERSION"
          git push origin "v$VERSION"

  # ─────────────────────────────────────────
  release:
    name: 🚀 GitHub Release
    runs-on: ubuntu-latest
    needs: [version, tag]

    steps:
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.version.outputs.new_version }}
          release_name: predictkit v${{ needs.version.outputs.new_version }}
          body: ${{ needs.version.outputs.changelog }}
          draft: false
          prerelease: false

  # ─────────────────────────────────────────
  sync:
    name: 🔄 Sync master → dev
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge master → dev
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git merge origin/master --no-ff -m "chore(sync): merge master release"
          git push origin dev
