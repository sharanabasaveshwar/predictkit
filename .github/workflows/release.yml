name: Release

on:
  pull_request:
    branches: [master]
    types: [closed]

jobs:
  release:
    name: Version bump, tag, GitHub Release
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" build twine

      - name: Get current version
        id: current_version
        run: |
          VERSION=$(python -c "
          import tomllib
          with open('pyproject.toml','rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Determine bump type
        id: bump
        run: |
          python3 - << 'PYEOF'
          import subprocess, re, os
          result = subprocess.run(['git','describe','--tags','--abbrev=0'], capture_output=True, text=True)
          log_range = f"{result.stdout.strip()}..HEAD" if result.returncode == 0 else "HEAD"
          commits = [
              c.strip() for c in
              subprocess.run(['git','log', log_range,'--format=%s'], capture_output=True, text=True).stdout.split('\n')
              if c.strip()
              and not c.strip().startswith('Merge ')
              and not re.match(r'^[Rr]evert', c.strip())
          ]
          bump = 'patch'
          for c in commits:
              if 'BREAKING CHANGE' in c or re.match(r'^[a-z]+[\w-]*(\(.+\))?!:', c):
                  bump = 'major'; break
              if re.match(r'^feat(\(.+\))?:', c) and bump != 'major':
                  bump = 'minor'
          print(f"Bump: {bump}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"bump={bump}\n")
          PYEOF

      - name: Calculate new version
        id: new_version
        run: |
          python3 - << 'PYEOF'
          import os
          cur = os.environ['CURRENT_VERSION']
          bump = os.environ['BUMP_TYPE']
          a, b, c = map(int, cur.split('.'))
          if bump == 'major':   a+=1; b=0; c=0
          elif bump == 'minor': b+=1; c=0
          else:                 c+=1
          v = f"{a}.{b}.{c}"
          print(f"{cur} -> {v}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"version={v}\n")
          PYEOF
        env:
          CURRENT_VERSION: ${{ steps.current_version.outputs.version }}
          BUMP_TYPE: ${{ steps.bump.outputs.bump }}

      - name: Bump version in pyproject.toml
        run: sed -i 's/^version = ".*"/version = "${{ steps.new_version.outputs.version }}"/' pyproject.toml

      - name: Bump version in __init__.py
        run: sed -i 's/__version__ = ".*"/__version__ = "${{ steps.new_version.outputs.version }}"/' predictkit/__init__.py

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Build + verify
        run: python -m build && twine check dist/*

      - name: Generate release notes
        run: |
          python3 - << 'PYEOF'
          import subprocess, re
          result = subprocess.run(['git','describe','--tags','--abbrev=0'], capture_output=True, text=True)
          log_range = f"{result.stdout.strip()}..HEAD" if result.returncode == 0 else "HEAD"
          commits = [
              c.strip() for c in
              subprocess.run(['git','log', log_range,'--format=%s'], capture_output=True, text=True).stdout.split('\n')
              if c.strip() and not c.strip().startswith('Merge ') and not re.match(r'^[Rr]evert', c.strip())
          ]
          sections = {'feat':('Features',[]),'fix':('Bug Fixes',[]),'perf':('Performance',[]),
                      'refactor':('Refactoring',[]),'docs':('Documentation',[]),'test':('Tests',[]),
                      'build':('Build',[]),'ci':('CI/CD',[]),'chore':('Chores',[]),'style':('Style',[])}
          for c in commits:
              m = re.match(r'^([a-z]+)(\(.+\))?!?:\s*(.+)', c)
              if m and m.group(1) in sections:
                  scope = f"**{m.group(2)[1:-1]}**: " if m.group(2) else ""
                  sections[m.group(1)][1].append(f"- {scope}{m.group(3)}")
          lines = ["## What's Changed\n"]
          for _, (title, items) in sections.items():
              if items: lines += [f"### {title}"] + items + [""]
          open('RELEASE_NOTES.md','w').write('\n'.join(lines))
          PYEOF

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml predictkit/__init__.py
          git commit -m "chore: bump version to ${{ steps.new_version.outputs.version }} [skip ci]"

      - name: Tag and push
        run: |
          TAG="v${{ steps.new_version.outputs.version }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin HEAD:master --follow-tags

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = `v${{ steps.new_version.outputs.version }}`;
            await github.rest.repos.createRelease({
              owner: context.repo.owner, repo: context.repo.repo,
              tag_name: tag, name: `PredictKit ${tag}`,
              body: fs.readFileSync('RELEASE_NOTES.md', 'utf8'),
              draft: false, prerelease: false,
            });