name: Tag Dev Snapshot

on:
  push:
    branches: [dev]
    # FIX [1]: Exclude tag pushes — annotated tag pushes (git push origin v*)
    # would otherwise re-trigger this workflow on some runner versions.
    tags-ignore:
      - "**"

# Prevent two snapshot jobs running simultaneously on rapid pushes to dev.
# The second push waits; it does NOT cancel the first (we want every merge tagged).
concurrency:
  group: tag-dev
  cancel-in-progress: false

jobs:
  tag-snapshot:
    name: Create dev snapshot tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # Skip the bot's own version-stamp commits (belt-and-suspenders alongside [skip ci])
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0       # full history — needed to scan existing tags
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 1. Read stable base version from pyproject.toml ───────────────────
      # pyproject.toml always holds the STABLE base (e.g. "0.1.0").
      # Only release.yml ever updates pyproject.toml.
      - name: Read base version
        id: base
        run: |
          VERSION=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'].split('-')[0])
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Base version: $VERSION"

      # ── 2. Next dev build number ──────────────────────────────────────────
      # FIX [2]: pure Python instead of grep -oP (no GNU grep dependency)
      - name: Calculate next dev build number
        id: devnum
        run: |
          python3 - << 'PYEOF'
          import subprocess, re, os

          base = os.environ["BASE_VERSION"]
          result = subprocess.run(
              ["git", "tag", "--list", f"v{base}-dev.*"],
              capture_output=True, text=True
          )
          nums = [
              int(m.group(1))
              for t in result.stdout.strip().splitlines()
              if (m := re.search(r"-dev\.(\d+)$", t.strip()))
          ]
          next_num = max(nums) + 1 if nums else 1
          print(f"Existing dev builds: {sorted(nums)}")
          print(f"Next dev build number: {next_num}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"next={next_num}\n")
          PYEOF
        env:
          BASE_VERSION: ${{ steps.base.outputs.version }}

      # ── 3. Full snapshot tag string ───────────────────────────────────────
      - name: Compose snapshot tag
        id: tag
        run: |
          TAG="v${{ steps.base.outputs.version }}-dev.${{ steps.devnum.outputs.next }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Snapshot tag: $TAG"

      # ── 4. Stamp __init__.py so runtime version matches tag ───────────────
      - name: Stamp dev version into predictkit/__init__.py
        run: |
          DEV_VER="${{ steps.base.outputs.version }}-dev.${{ steps.devnum.outputs.next }}"
          sed -i "s|__version__ = \".*\"|__version__ = \"${DEV_VER}\"|" predictkit/__init__.py
          grep '__version__' predictkit/__init__.py

      # ── 5. Commit the stamp back to dev ───────────────────────────────────
      # [skip ci] suppresses ci.yml re-run on this bot commit.
      # tag-dev itself is suppressed by the `if:` guard above.
      - name: Commit dev version stamp
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No __init__.py changes — skipping commit"
          else
            git add predictkit/__init__.py
            git commit -m "chore: stamp dev version ${{ steps.tag.outputs.tag }} [skip ci]"
            git push origin dev
          fi

      # ── 6. Push the annotated snapshot tag ───────────────────────────────
      # Tag pushes do NOT trigger `on: push: branches` — no loop risk.
      - name: Push snapshot tag
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git tag -a "$TAG" -m "Dev snapshot $TAG"
          git push origin "$TAG"
          echo "✅ Pushed: $TAG"

      # ── 7. Job summary ────────────────────────────────────────────────────
      - name: Summary
        run: |
          {
            echo "### 🔖 Dev Snapshot Tagged"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Tag** | \`${{ steps.tag.outputs.tag }}\` |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo "| **Triggered by** | ${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"
