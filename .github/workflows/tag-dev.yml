name: Tag Dev Snapshot
# Fires on every push to dev (including PR merges)

on:
  push:
    branches: [dev]

jobs:
  tag-snapshot:
    name: 🏷️ Create Dev Snapshot
    runs-on: ubuntu-latest
    permissions:
      contents: write  # push tags + version-bump commit

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history — needed to find latest tags
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── 1. SMART VERSIONING (from dev-tag.yml) ──────────────────────────
      - name: Calculate next dev version
        id: version
        run: |
          # Get last STABLE release tag
          LAST_STABLE=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" \
            | grep -v "-dev" \
            | sort -V | tail -1)
          
          [ -z "$LAST_STABLE" ] && LAST_STABLE="none"
          echo "Last stable: $LAST_STABLE"

          # Parse MAJOR.MINOR.PATCH
          if [ "$LAST_STABLE" = "none" ]; then
            MAJOR=0; MINOR=0; PATCH=0
          else
            CURRENT=${LAST_STABLE#v}
            MAJOR=$(echo $CURRENT | cut -d. -f1)
            MINOR=$(echo $CURRENT | cut -d. -f2)
            PATCH=$(echo $CURRENT | cut -d. -f3)
          fi

          # Analyze commits since stable for bump
          if [ "$LAST_STABLE" = "none" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" $LAST_STABLE..HEAD)
          fi

          # SEMVER BUMP LOGIC
          if echo "$COMMITS" | grep -qE "^(feat!|BREAKING CHANGE|breaking)"; then
            NEXT_STABLE="$((MAJOR + 1)).0.0"
          elif echo "$COMMITS" | grep -qE "^feat"; then
            NEXT_STABLE="${MAJOR}.$((MINOR + 1)).0"
          else
            NEXT_STABLE="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          # Dev build number
          LAST_DEV=$(git tag -l "v${NEXT_STABLE}-dev.*" | sort -V | tail -1)
          BUILD=$(echo $LAST_DEV | grep -oE "dev\.[0-9]+" | cut -d. -f2)
          BUILD=$((BUILD + 1)); [ -z "$BUILD" ] && BUILD=1

          DEV_TAG="v${NEXT_STABLE}-dev.${BUILD}"
          echo "dev_tag=$DEV_TAG" >> $GITHUB_OUTPUT
          echo "Next dev tag: $DEV_TAG"

      # ── 2. Update predictkit/__init__.py (from original tag-dev) ────────
      - name: Stamp dev version into __init__.py
        run: |
          DEV_VER="${{ steps.version.outputs.dev_tag }}"
          sed -i "s/__version__ = \".*\"/__version__ = \"$DEV_VER\"/" predictkit/__init__.py
          grep '__version__' predictkit/__init__.py

      - name: Commit dev version stamp
        run: |
          if git diff --quiet; then
            echo "No version change needed"
          else
            git add predictkit/__init__.py
            git commit -m "chore: stamp dev version ${{ steps.version.outputs.dev_tag }} [skip ci]"
            git push origin dev
          fi

      # ── 3. Create tag (from both) ──────────────────────────────────────
      - name: Push snapshot tag
        run: |
          TAG="${{ steps.version.outputs.dev_tag }}"
          git tag -a "$TAG" -m "Dev build: ${{ github.event.head_commit.message }} (${{ github.sha }})"
          git push origin "$TAG"
          echo "✅ Pushed: $TAG"

      - name: Summary
        run: |
          echo "### Dev Tag Created" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | ${{ steps.version.outputs.dev_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | `${{ github.sha }}` |" >> $GITHUB_STEP_SUMMARY[file:142][file:141]
